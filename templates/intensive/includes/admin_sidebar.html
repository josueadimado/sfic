{# Single source of truth for custom admin navigation. Expects context: admin_page #}
<aside class="admin-sidebar">
    <div class="admin-sidebar-head">
        <p class="eyebrow">Set Free In Christ</p>
        <h2>Admin Panel</h2>
    </div>
    <nav class="admin-menu">
        <a href="{% url 'dashboard' %}" class="{% if admin_page == 'registrations' %}is-active{% endif %}"><span class="menu-icon icon-registrations" aria-hidden="true"></span>Registrations</a>
        <a href="{% url 'dashboard_transactions' %}" class="{% if admin_page == 'transactions' %}is-active{% endif %}"><span class="menu-icon icon-sessions" aria-hidden="true"></span>Transactions</a>
        <a href="{% url 'dashboard_donations' %}" class="{% if admin_page == 'donations' %}is-active{% endif %}"><span class="menu-icon icon-sessions" aria-hidden="true"></span>Donations</a>
        <a href="{% url 'dashboard_free_codes' %}" class="{% if admin_page == 'free_codes' %}is-active{% endif %}"><span class="menu-icon icon-settings" aria-hidden="true"></span>Free Codes</a>
        <a href="{% url 'dashboard_sessions' %}" class="{% if admin_page == 'sessions' %}is-active{% endif %}"><span class="menu-icon icon-sessions" aria-hidden="true"></span>Training Sessions</a>
        <a href="{% url 'dashboard_schedule' %}" class="{% if admin_page == 'schedule' %}is-active{% endif %}"><span class="menu-icon icon-schedule" aria-hidden="true"></span>Training Schedule</a>
        <a href="{% url 'dashboard_speakers' %}" class="{% if admin_page == 'speakers' %}is-active{% endif %}"><span class="menu-icon icon-speakers" aria-hidden="true"></span>Speakers</a>
        <a href="{% url 'dashboard_site_settings' %}" class="{% if admin_page == 'settings' %}is-active{% endif %}"><span class="menu-icon icon-settings" aria-hidden="true"></span>Site Settings</a>
    </nav>
    <div class="admin-sidebar-foot">
        <a class="btn btn-outline btn-with-icon" href="{% url 'home' %}" target="_blank" rel="noreferrer">View Site <span class="btn-icon" aria-hidden="true">&#8599;</span></a>
        <form method="post" action="{% url 'logout' %}" class="inline-form">
            {% csrf_token %}
            <button class="btn btn-outline btn-with-icon" type="submit">Logout <span class="btn-icon" aria-hidden="true">&#10132;</span></button>
        </form>
    </div>
</aside>
